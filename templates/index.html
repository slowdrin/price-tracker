<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Tracker Dashboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-main: #0e1013;
      --bg-panel: #16181d;
      --bg-input: #1b1e24;
      --border-color: #262930;
      
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      
      --color-primary: #4caf50;
      --color-primary-hover: #43a047;
      --color-danger: #ef4444;
      --color-danger-hover: #dc2626;

      /* Status Badge Colors */
      --status-waiting-bg: #1e293b;
      --status-waiting-text: #38bdf8;
      --status-reached-bg: #064e3b;
      --status-reached-text: #34d399;
      --status-missing-bg: #451a03;
      --status-missing-text: #fbbf24;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      margin: 0; 
      background: var(--bg-main); 
      color: var(--text-main); 
      -webkit-font-smoothing: antialiased;
    }

    header { 
      padding: 24px 40px; 
      background: var(--bg-panel); 
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title h1 { 
      margin: 0 0 4px; 
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main); 
    }

    .header-title span {
      color: var(--color-primary);
    }

    .subtitle { 
      margin: 0; 
      color: var(--text-muted); 
      font-size: 0.9rem;
    }

    main { 
      padding: 32px 40px; 
      max-width: 1200px;
      margin: 0 auto;
    }

    .panel { 
      border: 1px solid var(--border-color); 
      background: var(--bg-panel); 
      padding: 20px; 
      margin-bottom: 24px; 
      border-radius: 12px; 
    }

    .panel h2 {
      font-size: 1.1rem;
      margin-top: 0;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .grid { 
      display: grid; 
      grid-template-columns: 1.2fr 2fr 0.6fr auto; 
      gap: 12px; 
    }

    /* Form Elements */
    input { 
      padding: 10px 14px; 
      border: 1px solid var(--border-color); 
      border-radius: 8px; 
      background: var(--bg-input); 
      color: white; 
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.15);
    }

    /* Buttons */
    button { 
      padding: 10px 16px; 
      border: 0; 
      border-radius: 8px; 
      background: var(--color-primary); 
      color: white; 
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer; 
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: var(--color-primary-hover); }
    button:active { transform: scale(0.98); }

    button.secondary {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }
    button.secondary:hover { background: var(--border-color); }

    button.danger { background: var(--color-danger); }
    button.danger:hover { background: var(--color-danger-hover); }

    /* Tables */
    .table-container {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-panel);
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      text-align: left;
    }

    th, td { 
      padding: 14px 20px; 
      border-bottom: 1px solid var(--border-color); 
      vertical-align: middle; 
      font-size: 0.9rem;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    th { 
      background: #1a1d24; 
      color: var(--text-muted); 
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Product Links and Info */
    .product-info a { 
      color: var(--text-main); 
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .product-info a:hover { 
      color: var(--color-primary); 
    }

    .muted { 
      color: var(--text-muted); 
      font-size: 0.75rem; 
      margin-top: 4px;
      max-width: 320px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Status Badges */
    .status { 
      padding: 4px 10px; 
      border-radius: 6px; 
      font-size: 0.75rem; 
      font-weight: 600; 
      display: inline-flex;
      align-items: center;
    }

    .waiting { background: var(--status-waiting-bg); color: var(--status-waiting-text); }
    .reached { background: var(--status-reached-bg); color: var(--status-reached-text); }
    .missing { background: var(--status-missing-bg); color: var(--status-missing-text); }

    .actions { display: flex; gap: 8px; }
    .target-input { width: 80px; padding: 6px 10px; }
    
    /* Global Status text styling */
    #statusText { 
      font-size: 0.85rem;
      color: var(--text-muted); 
      background: #1b1e24;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      display: none; /* Controlled dynamically below */
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title">
      <h1>Price<span>Tracker</span></h1>
      <p class="subtitle">Set your target price and get alerted dynamically when deals hit your mark.</p>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <span id="statusText"></span>
      <button class="secondary" onclick="checkNow()">
        <i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i> Check Prices Now
      </button>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>Add New Product</h2>
      <div class="grid">
        <input id="name" placeholder="Product name">
        <input id="url" placeholder="Product URL">
        <input id="targetPrice" type="number" step="0.01" placeholder="Target price ($)">
        <button onclick="addProduct()">
          <i data-lucide="plus" style="width: 16px; height: 16px;"></i> Add
        </button>
      </div>
    </section>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Target</th>
            <th>Last Price</th>
            <th>Status</th>
            <th>Last Checked</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="products"></tbody>
      </table>
    </div>
  </main>

  <script>
    // Helper to control flash update status styles beautifully
    function setStatusText(msg) {
      const el = document.getElementById('statusText');
      if(!msg) {
        el.style.display = 'none';
        return;
      }
      el.innerText = msg;
      el.style.display = 'inline-block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    function numberFromPrice(value) {
      if (!value) return null;
      const match = String(value).replace(',', '').match(/[\d.]+/);
      return match ? Number(match[0]) : null;
    }

    function getStatus(product) {
      const last = numberFromPrice(product.last_price);
      const target = Number(product.target_price);

      if (!last) return { text: 'Not checked yet', className: 'missing' };
      if (last <= target) return { text: 'Target reached', className: 'reached' };
      return { text: 'Watching', className: 'waiting' };
    }

    async function loadProducts() {
      const res = await fetch('/api/products');
      const products = await res.json();
      const tbody = document.getElementById('products');
      tbody.innerHTML = '';

      products.forEach((p, i) => {
        const status = getStatus(p);
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>
            <div class="product-info">
              <a href="${p.url}" target="_blank">${p.name}</a>
              <div class="muted" title="${p.url}">${p.url}</div>
            </div>
          </td>
          <td><input class="target-input" id="target-${i}" type="number" step="0.01" value="${p.target_price}"></td>
          <td style="font-weight: 600;">${p.last_price ?? '-'}</td>
          <td><span class="status ${status.className}">${status.text}</span></td>
          <td class="muted">${p.last_checked ? new Date(p.last_checked).toLocaleString() : '-'}</td>
          <td class="actions">
            <button class="secondary" style="padding: 6px 12px;" onclick="saveTarget(${i})" title="Save changes">Save</button>
            <button class="danger" style="padding: 6px 12px;" onclick="deleteProduct(${i})" title="Delete entry">Remove</button>
          </td>
        `;

        tbody.appendChild(row);
      });
      // Always initialize lucide icons dynamically rendered elements
      lucide.createIcons();
    }

    async function addProduct() {
      const body = {
        name: document.getElementById('name').value,
        url: document.getElementById('url').value,
        target_price: Number(document.getElementById('targetPrice').value)
      };

      const res = await fetch('/api/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (!res.ok) {
        setStatusText(data.error || 'Could not add product.');
        return;
      }

      document.getElementById('name').value = '';
      document.getElementById('url').value = '';
      document.getElementById('targetPrice').value = '';
      setStatusText('Product added.');
      loadProducts();
    }

    async function saveTarget(index) {
      const target = document.getElementById(`target-${index}`).value;

      await fetch(`/api/products/${index}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target_price: Number(target) })
      });

      setStatusText('Target updated.');
      loadProducts();
    }

    async function deleteProduct(index) {
      if(!confirm("Are you sure you want to delete this tracked item?")) return;
      await fetch(`/api/products/${index}`, { method: 'DELETE' });
      setStatusText('Product removed.');
      loadProducts();
    }

    async function checkNow() {
      setStatusText('Checking prices...');
      await fetch('/api/check', { method: 'POST' });
      setStatusText('Check complete.');
      loadProducts();
    }

    // Initial loader call
    loadProducts();
  </script>
</body>
</html>
