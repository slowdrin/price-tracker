<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Price Tracker</title>
  <style>
    body {
      width: 280px;
      font-family: Arial, sans-serif;
      padding: 14px;
      background: #111;
      color: #eee;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
      color: #4caf50;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      color: #ccc;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1b1b1b;
      color: #fff;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      border: none;
      border-radius: 4px;
      background: #4caf50;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #43a047;
    }

    .secondary {
      background: #2f3542;
    }

    .secondary:hover {
      background: #3d4656;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Price Tracker</h1>

  <label>Product name</label>
  <input id="name" type="text" placeholder="Product name">

  <label>Target price</label>
  <input id="targetPrice" type="number" step="0.01" placeholder="Example: 150">

  <button id="trackBtn">Track Product</button>
  <button id="dashboardBtn" class="secondary">Open Dashboard</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
